services:
  postiz:
    image: ghcr.io/insiterd/miposting-postiz:latest
    container_name: postiz
    restart: always
    deploy:
      resources:
        limits:
          memory: 6g
        reservations:
          memory: 512m
    environment:
      MAIN_URL: 'https://miposting.com'
      FRONTEND_URL: 'https://app.miposting.com'
      NEXT_PUBLIC_BACKEND_URL: 'https://app.miposting.com/api'
      DATABASE_URL: 'postgresql://postiz-user:postiz-password@postiz-postgres:5432/postiz-db-local'
      REDIS_URL: 'redis://postiz-redis:6379'
      BACKEND_INTERNAL_URL: 'http://localhost:3000'
      TEMPORAL_ADDRESS: "temporal:7233"
      IS_GENERAL: 'true'
      DISABLE_REGISTRATION: 'false'
      FEE_AMOUNT: 0.05
      API_LIMIT: 30
      RUN_CRON: 'true'
      NX_ADD_PLUGINS: false
    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.postiz.loadbalancer.server.port=5000"
      - "traefik.http.routers.postiz.rule=Host(`app.miposting.com`)"
      - "traefik.http.routers.postiz.entrypoints=https"
      - "traefik.http.routers.postiz.tls=true"
      - "traefik.http.routers.postiz.middlewares=gzip"
      - "traefik.http.routers.postiz.priority=100"
    healthcheck:
      test: curl -f http://localhost:5000/ || exit 1
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - postiz-network
      - temporal-network
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
      temporal:
        condition: service_healthy

  postiz-postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: postiz-password
      POSTGRES_USER: postiz-user
      POSTGRES_DB: postiz-db-local
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    networks:
      - postiz-network
    healthcheck:
      test: pg_isready -U postiz-user -d postiz-db-local
      interval: 10s
      timeout: 3s
      retries: 3

  postiz-redis:
    image: redis:7.2
    container_name: postiz-redis
    restart: always
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - postiz-redis-data:/data
    networks:
      - postiz-network

  postiz-landing:
    image: ghcr.io/insiterd/miposting-landing:latest
    container_name: postiz-landing
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.landing.loadbalancer.server.port=80"
      - "traefik.http.routers.landing.rule=Host(`miposting.com`)"
      - "traefik.http.routers.landing.entrypoints=https"
      - "traefik.http.routers.landing.tls=true"
      - "traefik.http.routers.landing.middlewares=gzip"
      - "traefik.http.routers.landing.priority=100"
    healthcheck:
      test: wget -qO- http://127.0.0.1:80/ || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - postiz-network

  temporal-elasticsearch:
    container_name: temporal-elasticsearch
    image: elasticsearch:7.17.27
    restart: always
    deploy:
      resources:
        limits:
          memory: 1536m
    environment:
      - ES_JAVA_OPTS=-Xms768m -Xmx768m
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - xpack.security.enabled=false
    networks:
      - temporal-network
    expose:
      - 9200
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - temporal-elasticsearch-data:/usr/share/elasticsearch/data

  temporal-postgresql:
    container_name: temporal-postgresql
    image: postgres:16
    restart: always
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    networks:
      - temporal-network
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - temporal-postgresql-data:/var/lib/postgresql/data

  temporal:
    container_name: temporal
    restart: always
    image: temporalio/auto-setup:1.28.1
    depends_on:
      temporal-postgresql:
        condition: service_healthy
      temporal-elasticsearch:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
      - TEMPORAL_NAMESPACE=default
      - BIND_ON_IP=0.0.0.0
    networks:
      - temporal-network
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "temporal:7233"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig

  temporal-ui:
    container_name: temporal-ui
    image: temporalio/ui:2.34.0
    restart: always
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://127.0.0.1:3000
    networks:
      - temporal-network
    ports:
      - "127.0.0.1:8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      temporal:
        condition: service_healthy

  temporal-admin-tools:
    container_name: temporal-admin-tools
    image: temporalio/admin-tools:1.28.1-tctl-1.18.4-cli-1.4.1
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    networks:
      - temporal-network
    stdin_open: true
    depends_on:
      - temporal
    tty: true

volumes:
  postgres-volume:
  postiz-redis-data:
  postiz-config:
  postiz-uploads:
  temporal-elasticsearch-data:
  temporal-postgresql-data:

networks:
  postiz-network:
    external: false
  temporal-network:
    driver: bridge
    name: temporal-network
