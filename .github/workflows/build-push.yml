---
name: Build & Push Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  POSTIZ_IMAGE: ghcr.io/insiterd/miposting-postiz
  LANDING_IMAGE: ghcr.io/insiterd/miposting-landing

jobs:
  build-postiz:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push postiz
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.POSTIZ_IMAGE }}:${{ github.sha }}
            ${{ env.POSTIZ_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.POSTIZ_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.POSTIZ_IMAGE }}:cache,mode=max

  build-landing:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push landing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: landing/Dockerfile
          push: true
          tags: |
            ${{ env.LANDING_IMAGE }}:${{ github.sha }}
            ${{ env.LANDING_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.LANDING_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.LANDING_IMAGE }}:cache,mode=max
