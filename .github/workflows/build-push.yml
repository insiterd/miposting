---
name: Build & Push Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  POSTIZ_IMAGE: ghcr.io/insiterd/miposting-postiz
  LANDING_IMAGE: ghcr.io/insiterd/miposting-landing

jobs:
  build-postiz:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push postiz
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.POSTIZ_IMAGE }}:${{ github.sha }}
            ${{ env.POSTIZ_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.POSTIZ_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.POSTIZ_IMAGE }}:cache,mode=max

  build-landing:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push landing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: landing/Dockerfile
          push: true
          tags: |
            ${{ env.LANDING_IMAGE }}:${{ github.sha }}
            ${{ env.LANDING_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.LANDING_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.LANDING_IMAGE }}:cache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build-postiz, build-landing]
    steps:
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.VPS_SSH_KEY }}
          known_hosts: ${{ secrets.VPS_HOST }} ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBDhbWsLELGgA9ZzI81PhOhklJh4quXSRbjKmRWGGL8ORlx1JkeK0FNgR/ff4NRFhG1sWSXwcpTKVAJH+z60isgg=

      - name: Pull latest images and restart
        run: |
          ssh root@${{ secrets.VPS_HOST }} "docker compose -f /data/coolify/applications/flofb07yh5gfcgxhw0ko0m1j/docker-compose.yaml stop postiz postiz-landing && docker pull ghcr.io/insiterd/miposting-postiz:latest && docker pull ghcr.io/insiterd/miposting-landing:latest && docker compose -f /data/coolify/applications/flofb07yh5gfcgxhw0ko0m1j/docker-compose.yaml up -d --no-deps postiz postiz-landing"
