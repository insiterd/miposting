---
name: Build & Push Images

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  POSTIZ_IMAGE: ghcr.io/insiterd/miposting-postiz
  LANDING_IMAGE: ghcr.io/insiterd/miposting-landing

jobs:
  build-postiz:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push postiz
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.POSTIZ_IMAGE }}:${{ github.sha }}
            ${{ env.POSTIZ_IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_VERSION=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.POSTIZ_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.POSTIZ_IMAGE }}:cache,mode=max

  build-landing:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push landing
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: landing/Dockerfile
          push: true
          tags: |
            ${{ env.LANDING_IMAGE }}:${{ github.sha }}
            ${{ env.LANDING_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.LANDING_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.LANDING_IMAGE }}:cache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build-postiz, build-landing]
    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Pull latest images and restart
        run: |
          ssh dev@${{ secrets.VPS_HOST }} "
            set -e
            COMPOSE_FILE='/data/coolify/applications/flofb07yh5gfcgxhw0ko0m1j/docker-compose.yaml'

            echo '=== Validando acceso a Docker socket ==='
            docker info > /dev/null 2>&1 || { echo 'Error: dev no tiene acceso a Docker socket'; exit 1; }

            echo '=== Pinning images to ${{ github.sha }} ==='
            sudo sed -i -E 's|(ghcr.io/insiterd/miposting-postiz):[a-zA-Z0-9_.-]+|\1:${{ github.sha }}|g' \"\$COMPOSE_FILE\"
            sudo sed -i -E 's|(ghcr.io/insiterd/miposting-landing):[a-zA-Z0-9_.-]+|\1:${{ github.sha }}|g' \"\$COMPOSE_FILE\"

            echo '=== Adding certResolver to Docker router labels ==='
            if ! grep -q 'tls.certResolver' \"\$COMPOSE_FILE\"; then
              sudo sed -i '/traefik.http.routers.postiz.tls=true$/a\            - traefik.http.routers.postiz.tls.certResolver=letsencrypt' \"\$COMPOSE_FILE\"
            fi

            echo '=== Pulling new images ==='
            docker compose -f \"\$COMPOSE_FILE\" pull postiz postiz-landing

            echo '=== Recreating containers ==='
            docker compose -f \"\$COMPOSE_FILE\" up -d --no-deps postiz postiz-landing

            echo '=== Waiting for containers to be healthy... ==='
            for i in \$(seq 1 30); do
              POSTIZ_ID=\$(docker ps -q -f 'label=com.docker.compose.service=postiz')
              LANDING_ID=\$(docker ps -q -f 'label=com.docker.compose.service=postiz-landing')
              HEALTH=\$(docker inspect --format='{{.State.Health.Status}}' \"\$POSTIZ_ID\" 2>/dev/null || echo 'n/a')
              LANDING_HEALTH=\$(docker inspect --format='{{.State.Health.Status}}' \"\$LANDING_ID\" 2>/dev/null || echo 'n/a')
              echo \"  postiz: \$HEALTH, landing: \$LANDING_HEALTH\"
              if [ \"\$HEALTH\" = 'healthy' ] && [ \"\$LANDING_HEALTH\" = 'healthy' ]; then
                echo 'Both containers healthy!'
                break
              fi
              sleep 3
            done

            echo '=== Waiting for NestJS backend to be ready... ==='
            POSTIZ_CONTAINER=\$(docker ps -q -f 'label=com.docker.compose.service=postiz')
            for i in \$(seq 1 12); do
              BACKEND_OK=\$(docker exec \"\$POSTIZ_CONTAINER\" bash -c 'timeout 3 cat < /dev/null > /dev/tcp/127.0.0.1/5000' 2>/dev/null && echo 'ok' || echo 'no')
              if [ \"\$BACKEND_OK\" = 'ok' ]; then
                echo 'Backend ready!'
                break
              fi
              echo \"  backend attempt \$i/12\"
              sleep 5
            done

            echo '=== Verifying routers.yaml integrity ==='
            ROUTERS_FILE='/data/coolify/proxy/dynamic/routers.yaml'
            if [ -f \"\$ROUTERS_FILE\" ]; then
              if grep -q 'postiz-api:' \"\$ROUTERS_FILE\"; then
                echo 'WARNING: routers.yaml has old postiz-api router name, fixing...'
                sudo sed -i 's/postiz-api:/postiz-app:/g' \"\$ROUTERS_FILE\"
                sudo sed -i 's/service: postiz-api/service: postiz-app/g' \"\$ROUTERS_FILE\"
              fi
              if ! grep -q 'certResolver' \"\$ROUTERS_FILE\"; then
                echo 'FIX: adding certResolver: letsencrypt + priority: 101 to file routers...'
                sudo sed -i '/^    postiz-app:/,/    landing-web:/{
                  /tls: true/s/tls: true/tls:\n          certResolver: letsencrypt/
                }' \"\$ROUTERS_FILE\"
                sudo sed -i '/^    landing-web:/,/    middlewares:/{
                  /tls: true/s/tls: true/tls:\n          certResolver: letsencrypt/
                }' \"\$ROUTERS_FILE\"
                sudo sed -i '/^    postiz-app:/,/    middlewares:/s/priority: [0-9]*/priority: 101/' \"\$ROUTERS_FILE\"
                sudo sed -i '/^    landing-web:/,/    middlewares:/s/priority: [0-9]*/priority: 101/' \"\$ROUTERS_FILE\"
              fi
              echo 'routers.yaml OK'
            else
              echo 'WARNING: routers.yaml missing, creating...'
              cat << 'YAML' | sudo tee \"\$ROUTERS_FILE\" > /dev/null
          http:
            routers:
              postiz-app:
                rule: \"Host(\\\`app.miposting.com\\\`)\"
                entryPoints:
                  - https
                service: postiz-app
                tls:
                  certResolver: letsencrypt
                priority: 101
                middlewares:
                  - gzip
              landing-web:
                rule: \"Host(\\\`miposting.com\\\`)\"
                entryPoints:
                  - https
                service: landing-web
                tls:
                  certResolver: letsencrypt
                priority: 101
                middlewares:
                  - gzip
            services:
              postiz-app:
                loadBalancer:
                  servers:
                    - url: \"http://postiz:5000\"
                  passHostHeader: true
              landing-web:
                loadBalancer:
                  servers:
                    - url: \"http://postiz-landing:80\"
                  passHostHeader: true
            middlewares:
              gzip:
                compress: {}
          YAML
            fi

            echo '=== Refreshing Traefik routes ==='
            docker restart coolify-proxy || true
            sleep 5

            echo '=== Verifying endpoints (with retries) ==='
            for i in \$(seq 1 12); do
              API_OK=false
              LANDING_OK=false
              FRONTEND_OK=false

              curl -sfI --max-time 10 'https://app.miposting.com/api/health' && API_OK=true
              curl -sfI --max-time 10 'https://miposting.com/' && LANDING_OK=true
              curl -sfI --max-time 10 'https://app.miposting.com/auth' && FRONTEND_OK=true

              if [ \"\$API_OK\" = true ] && [ \"\$LANDING_OK\" = true ] && [ \"\$FRONTEND_OK\" = true ]; then
                echo 'All endpoints verified on attempt $i'
                break
              fi

              echo \"Attempt \$i failed (API:\$API_OK, Landing:\$LANDING_OK, Frontend:\$FRONTEND_OK), retrying in 5s...\"
              sleep 5

              if [ \"\$i\" = '12' ]; then
                echo 'ERROR: Endpoints failed after 5 attempts'
                exit 1
              fi
            done

            echo '=== Deploy complete ==='
          "
